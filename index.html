<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clanker Invasion Clicker</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@800&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #090d16;
            color: #ffffff;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none;
        }

        /* Large fullscreen background click pad */
        .click-pad {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            cursor: pointer;
            z-index: 1;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .ui-layer {
            position: relative;
            text-align: center;
            z-index: 10;
            pointer-events: none; /* Allows clicks to pass through to the background pad */
        }

        h1 {
            font-size: 2.5rem;
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 2px;
            background: linear-gradient(to right, #38bdf8, #f43f5e);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .counter {
            font-size: 5rem;
            font-weight: 800;
            margin-top: 10px;
            text-shadow: 0 0 20px rgba(244, 63, 94, 0.4);
            transition: transform 0.05s ease;
        }

        .counter.bounce {
            transform: scale(1.2);
        }

        /* --- THE SPAWNING CLANKER AVATAR --- */
        .clanker-spawn {
            position: absolute;
            width: 200px;  /* Adjust size of jumping Clankers here */
            height: 200px;
            object-fit: contain;
            pointer-events: none;
            z-index: 5;
            animation: jumpOut 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        @keyframes jumpOut {
            0% {
                transform: translate(-50%, -50%) scale(0) rotate(0deg);
                opacity: 0;
            }
            30% {
                transform: translate(-50%, calc(-50% - 80px)) scale(1.5) rotate(var(--rot));
                opacity: 1;
            }
            100% {
                transform: translate(-50%, calc(-50% + 100px)) scale(0.8) rotate(var(--rot));
                opacity: 0;
            }
        }

        /* --- SCREAM TEXT EFFECT --- */
        .scream-text {
            position: absolute;
            font-size: 2.5rem;
            font-weight: 800;
            color: #f43f5e;
            text-shadow: 0 0 15px rgba(244, 63, 94, 0.8);
            pointer-events: none;
            z-index: 6;
            animation: textFloat 0.5s ease-out forwards;
        }

        @keyframes textFloat {
            0% {
                transform: translate(-50%, -50%) scale(0.5);
                opacity: 1;
            }
